# Deploy to Google Cloud Run via Workload Identity Federation. The Cloud
# Run service pulls the deploy image from an Artifact Registry remote
# repository that proxies GHCR (Cloud Run can't pull from GHCR directly).
#
# One-time GCP-side setup is documented inline in the README's `Deploy`
# section: AR remote repo + WIF pool + provider + service account + role
# bindings.
name: deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag (default 'main' = latest CI-baked image)"
        required: true
        default: "main"

permissions:
  contents: read
  id-token: write    # required for WIF OIDC token

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  GCP_REGION: europe-west1
  GHCR_REMOTE_REPO: ghcr-remote
  SERVICE_NAME: prismrag

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Compute image URI
        id: image
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          URI="${GCP_REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${GHCR_REMOTE_REPO}/${REPO_LOWER}:${IMAGE_TAG}"
          echo "uri=$URI" >> "$GITHUB_OUTPUT"
          echo "Image URI: $URI"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ steps.image.outputs.uri }}
          region: ${{ env.GCP_REGION }}
          flags: --port=8000 --memory=1Gi --cpu=1 --min-instances=0 --max-instances=2 --allow-unauthenticated

      - name: Print URL
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "::notice::Deployed to $URL"
          {
            echo "## Deployed"
            echo "- URL: $URL"
            echo "- Image: \`${{ steps.image.outputs.uri }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
