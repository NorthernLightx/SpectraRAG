# Single-shot deploy via `az` CLI. Idempotent — creates the Resource Group
# + Container Apps Environment + Container App on first run, updates the
# image on subsequent runs. No state file, no IaC tool: a one-Container-App
# topology doesn't justify the overhead.
name: deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default 'main' = latest CI-baked)"
        required: true
        default: "main"

permissions:
  contents: read
  id-token: write    # OIDC to Azure

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision and deploy
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          RG=ragdemo-prod-rg
          APP=ragdemo-prod-api
          ENV_NAME=ragdemo-prod-env
          LOC=westeurope
          # GHCR namespaces are case-insensitive but the canonical form is
          # lowercase; az pulls fail on mixed-case repository paths.
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$REPO_LOWER:$IMAGE_TAG"
          echo "Image: $IMAGE"

          az group create -n "$RG" -l "$LOC" --output none

          az containerapp env show -n "$ENV_NAME" -g "$RG" >/dev/null 2>&1 \
            || az containerapp env create -n "$ENV_NAME" -g "$RG" -l "$LOC" --output none

          if az containerapp show -n "$APP" -g "$RG" >/dev/null 2>&1; then
            echo "Updating existing app to new image"
            az containerapp update -n "$APP" -g "$RG" --image "$IMAGE" --output none
          else
            echo "Creating new app"
            az containerapp create \
              -n "$APP" -g "$RG" \
              --environment "$ENV_NAME" \
              --image "$IMAGE" \
              --target-port 8000 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 2 \
              --cpu 0.5 \
              --memory 1.0Gi \
              --output none
          fi

          FQDN=$(az containerapp show -n "$APP" -g "$RG" \
                 --query properties.configuration.ingress.fqdn -o tsv)
          echo "::notice::Deployed to https://$FQDN"
          {
            echo "## Deployed"
            echo "- URL: https://$FQDN"
            echo "- Image: \`$IMAGE\`"
          } >> "$GITHUB_STEP_SUMMARY"
