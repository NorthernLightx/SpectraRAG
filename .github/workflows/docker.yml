# The deployable image bundles a baked Qdrant snapshot (`qdrant_local/`) and
# pre-rendered page PNGs (`data/pages/`), both gitignored — CI's checkout
# can't see them. So this workflow only validates the build on `main` / PRs;
# pushes to GHCR happen only on version tags (`v*`), and the actual demo
# image is published via `scripts/bake_and_push.ps1` from a developer
# machine that has the rendered artefacts.
name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The runtime image bundles torch + colpali-engine + transformers, which
      # blow past the ~14 GB free disk on a default ubuntu-latest runner during
      # the wheel-install phase. Free up ~15 GB by removing Android / .NET /
      # Haskell tooling that's pre-installed but unused here. Keeps the tool
      # cache (Python) and Docker images cache so Buildx still warms fast.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build (push only on version tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
