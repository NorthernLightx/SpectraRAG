<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PrismRAG — figures</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.55;
      }
      header {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        padding: 24px 24px 8px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .title-block p { max-width: 620px; }
      .title-block h1 {
        margin: 0 0 4px;
        font-size: 22px;
        font-weight: 600;
        color: var(--fg-strong);
      }
      .title-block p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .icon-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--fg);
        border-radius: 8px;
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .icon-btn:hover { background: var(--canvas); border-color: var(--accent); color: var(--accent); }
      [data-theme="dark"] .icon-sun { display: none; }
      [data-theme="light"] .icon-moon { display: none; }

      .nav {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        padding: 4px 24px 16px;
        display: flex;
        gap: 4px;
        font-size: 13px;
      }

      .controls {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        padding: 16px 24px;
        display: grid;
        grid-template-columns: minmax(240px, 280px) minmax(220px, 280px) 1fr;
        gap: 16px;
        align-items: start;
      }
      .controls > div { display: flex; flex-direction: column; gap: 6px; }
      .controls label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        opacity: 0.85;
      }
      select, input {
        width: 100%;
      }
      @media (max-width: 880px) {
        .controls {
          grid-template-columns: 1fr;
        }
      }

      main {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        padding: 0 24px 32px;
      }
      .status {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 12px;
      }
      .figures-grid {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }
      .figure-card {
        background: var(--canvas-elevated);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: border-color 0.15s ease, transform 0.06s ease;
      }
      .figure-card:hover { border-color: var(--accent); }
      .figure-card .thumb-wrap {
        position: relative;
        background: var(--canvas);
        border-bottom: 1px solid var(--border-subtle);
        aspect-ratio: 8.5 / 11;
        overflow: hidden;
        display: block;
      }
      .figure-card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .figure-card .bbox {
        position: absolute;
        border: 2px solid var(--accent);
        background: var(--accent-tint);
        pointer-events: none;
      }
      .figure-card .body {
        padding: 10px 12px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .figure-card .meta {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .figure-card .caption {
        font-size: 13px;
        color: var(--fg);
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .figure-card .caption.is-empty {
        color: var(--muted);
        font-style: italic;
      }
      .vlm-tag {
        display: inline-block;
        background: var(--accent-tint);
        color: var(--accent);
        font-size: 10px;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 4px;
        margin-left: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      /* === Element-type selector (ADR 0022 follow-up — UI polish) ===
         The selector is a multi-group surface, not a flat chip soup.
         Chips are grouped semantically (Charts / Media / Decorative /
         Other) so the eye lands on the bucket the user wants before it
         lands on a specific label. The master toolbar sits apart from
         the chips with its own visual weight. */
      .type-filter-wrap {
        flex: 1;
        min-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .type-filter {
        position: relative;
        padding: 14px 16px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background:
          linear-gradient(180deg, transparent, var(--accent-tint) 600%),
          var(--canvas-elevated);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .type-filter::-webkit-scrollbar { width: 6px; }
      .type-filter::-webkit-scrollbar-track { background: transparent; }
      .type-filter::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 999px;
      }
      .type-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-subtle);
      }
      .type-toolbar-summary {
        font-size: 11.5px;
        color: var(--muted);
        letter-spacing: 0.02em;
        font-variant-numeric: tabular-nums;
      }
      .type-toolbar-summary strong {
        color: var(--fg);
        font-weight: 600;
      }
      .type-toolbar-actions {
        display: flex;
        gap: 6px;
      }
      .type-toolbar-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
        font-weight: 500;
        padding: 4px 11px;
        border-radius: 999px;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition: color 0.12s ease, border-color 0.12s ease, background 0.12s ease;
      }
      .type-toolbar-btn:hover {
        color: var(--fg);
        border-color: var(--accent);
        background: var(--accent-tint);
      }
      .type-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .type-group-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        opacity: 0.7;
      }
      .type-group-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      /* With only 4 coarse chips, give each one a bit more presence. */
      .type-chip {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 14px 7px 12px;
        border-radius: 999px;
        font-size: 13.5px;
        font-weight: 500;
        background: var(--canvas);
        color: var(--fg);
        border: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
        transition:
          background 0.14s ease,
          border-color 0.14s ease,
          color 0.14s ease,
          box-shadow 0.14s ease,
          transform 0.06s ease;
      }
      .type-chip::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--border);
        flex-shrink: 0;
        transition: background 0.14s ease, box-shadow 0.14s ease;
      }
      .type-chip:hover {
        border-color: var(--accent);
        color: var(--fg-strong);
        transform: translateY(-0.5px);
      }
      .type-chip:active { transform: translateY(0); }
      .type-chip.on {
        background: var(--accent-tint);
        color: var(--accent);
        border-color: var(--accent);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05), 0 0 0 1px var(--accent-tint) inset;
      }
      .type-chip.on::before {
        background: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-tint);
      }
      .type-chip .count {
        font-variant-numeric: tabular-nums;
        font-size: 11px;
        color: var(--muted);
        font-weight: 600;
        padding-left: 2px;
      }
      .type-chip.on .count { color: var(--accent); opacity: 0.8; }
    </style>
  </head>
  <body>
    <header>
      <div class="title-block">
        <h1>PrismRAG</h1>
        <p>
          Browse every figure and table across the demo corpus, with
          bbox-highlighted thumbnails and Docling-classifier labels.
          Filter by element type, paper, or caption text.
        </p>
      </div>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13Zm8-5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 16 8ZM3 8a.75.75 0 0 1-.75.75H.75a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 3 8Zm10.657-5.657a.75.75 0 0 1 0 1.06l-1.06 1.061a.75.75 0 1 1-1.061-1.06l1.06-1.061a.75.75 0 0 1 1.061 0Zm-9.193 9.193a.75.75 0 0 1 0 1.061l-1.06 1.06a.75.75 0 1 1-1.061-1.06l1.06-1.06a.75.75 0 0 1 1.061 0Zm9.193 2.121a.75.75 0 0 1-1.06 0l-1.061-1.06a.75.75 0 1 1 1.06-1.061l1.061 1.06a.75.75 0 0 1 0 1.061ZM4.464 4.464a.75.75 0 0 1-1.06 0l-1.061-1.06a.75.75 0 1 1 1.06-1.061l1.061 1.06a.75.75 0 0 1 0 1.061Z"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Zm1.616 1.945a7 7 0 0 1-7.678 7.678 5.499 5.499 0 1 0 7.678-7.678Z"/>
        </svg>
      </button>
    </header>

    <nav class="nav">
      <a href="/">Chat</a>
      <a href="/inspection.html">Inspection</a>
      <a href="/papers.html">Papers</a>
      <a href="/figures.html" class="active">Figures</a>
      <a href="/why-multimodal.html">Why multimodal?</a>
    </nav>

    <div class="controls">
      <div>
        <label for="paperFilter">Paper</label>
        <select id="paperFilter">
          <option value="">All papers</option>
        </select>
      </div>
      <div>
        <label for="captionFilter">Caption contains</label>
        <input id="captionFilter" type="search" placeholder="e.g. accuracy, scaling" />
      </div>
      <div class="type-filter-wrap">
        <label>Element types
          <span class="info-icon" title="ADR 0022 — picks from Docling's DocumentFigureClassifier-v2.5 labels (logo, bar_chart, flow_chart, photograph, ...) plus extracted tables. Multi-select; click 'All' to flip everything on/off.">i</span>
        </label>
        <div class="type-filter" id="typeFilter"></div>
      </div>
    </div>

    <main>
      <div class="status" id="status">Loading…</div>
      <ul class="figures-grid" id="figures"></ul>
    </main>

    <script src="/app.js"></script>
    <script>
      const statusEl = document.getElementById("status");
      const figuresEl = document.getElementById("figures");
      const paperFilterEl = document.getElementById("paperFilter");
      const captionFilterEl = document.getElementById("captionFilter");
      const typeFilterEl = document.getElementById("typeFilter");

      let allFigures = [];
      let paperTitles = {}; // paper_id → title (when available)
      let fetchError = null; // sticky message when /figures couldn't load
      // type-key → bool; populated after fetch.
      let selectedTypes = {};

      Promise.all([
        fetch("/papers")
          .then((r) => (r.ok ? r.json() : []))
          .catch(() => []),
        fetchFigures(),
      ]).then(([papers]) => {
        for (const p of papers || []) {
          paperTitles[p.paper_id] = p.title || null;
          const opt = document.createElement("option");
          opt.value = p.paper_id;
          opt.textContent = p.title ? `${p.title} (${p.paper_id})` : p.paper_id;
          paperFilterEl.append(opt);
        }
        buildTypeFilter();
        render();
      });

      paperFilterEl.addEventListener("change", render);
      captionFilterEl.addEventListener("input", render);

      // Coarse element-type taxonomy for the gallery filter. The fine
      // Docling label (line_chart, scatter_plot, qr_code, ...) is still
      // visible on each card as a small badge — what we filter on at the
      // top level is the broader category most users actually pick by.
      // Keeps the selector to ~4 chips instead of 16.
      const COARSE_TYPES = {
        figure: {
          label: "Figures",
          // Anything Docling considers real publication content: charts,
          // diagrams, photos, screenshots, maps, structures, etc.
          dockingLabels: new Set([
            "line_chart", "bar_chart", "scatter_plot", "scatter_chart",
            "stacked_bar_chart", "pie_chart", "box_plot", "heatmap", "flow_chart",
            "photograph", "natural_image", "screenshot_from_computer",
            "screenshot_from_manual", "screenshot", "full_page_image",
            "engineering_drawing", "cad_drawing", "electrical_diagram",
            "chemistry_structure", "chemistry_molecular_structure",
            "chemistry_markush_structure", "geographical_map", "geographic_map",
            "map", "topographical_map", "remote_sensing", "stratigraphic_chart",
            "music", "picture_group",
          ]),
        },
        table: {
          label: "Tables",
          // `kind=table` chunks; picture-side detections classified as
          // table-shaped go here too so duplicates land in the same bucket.
          dockingLabels: new Set(["table"]),
        },
        decoration: {
          label: "Decorative",
          // Logos, icons, page furniture — the bucket the gallery hides
          // by default.
          dockingLabels: new Set([
            "logo", "icon", "signature", "stamp", "bar_code", "qr_code",
            "page_thumbnail", "calendar", "crossword_puzzle",
          ]),
        },
        other: {
          label: "Other",
          // Catch-all: Docling's `other`, low-confidence detections, and
          // legacy chunks without a docling_label.
          dockingLabels: new Set(["other"]),
        },
      };

      // Each item's coarse type. Prefer Docling's fine label mapped through
      // the table above; fall back to the chunk's stored role (ADR 0022)
      // when no classifier label is present (legacy collections).
      function itemType(f) {
        if (f.kind === "table") return "table";
        if (f.docling_label) {
          for (const [coarse, def] of Object.entries(COARSE_TYPES)) {
            if (def.dockingLabels.has(f.docling_label)) return coarse;
          }
          return "other";
        }
        // Legacy mapping: role values match coarse-type keys 1:1 except
        // `unlabeled` which falls into `other`.
        if (f.role === "figure" || f.role === "decoration") return f.role;
        return "other";
      }

      const COARSE_ORDER = ["figure", "table", "decoration", "other"];

      function buildTypeFilter() {
        // Count items per coarse type so the chip carries useful weight.
        const counts = {};
        for (const f of allFigures) {
          const t = itemType(f);
          counts[t] = (counts[t] || 0) + 1;
        }
        // Only render types that exist in the data, in the defined order.
        const presentTypes = COARSE_ORDER.filter((t) => counts[t]);
        // Seed `selectedTypes`: figure + table on by default; the rest off.
        const DEFAULTS_ON = new Set(["figure", "table"]);
        for (const t of presentTypes) {
          if (!(t in selectedTypes)) selectedTypes[t] = DEFAULTS_ON.has(t);
        }
        clear(typeFilterEl);

        // Toolbar: live summary + Select-all / Clear / Reset.
        const toolbar = document.createElement("div");
        toolbar.className = "type-toolbar";
        const summary = document.createElement("div");
        summary.className = "type-toolbar-summary";
        const sumLeadCount = document.createElement("strong");
        const sumLeadTotal = document.createTextNode("");
        const sumMidCount = document.createElement("strong");
        const sumTail = document.createTextNode("");
        summary.append(sumLeadCount, sumLeadTotal, sumMidCount, sumTail);
        const updateSummary = () => {
          const on = presentTypes.filter((t) => selectedTypes[t]);
          const onCount = on.reduce((acc, t) => acc + (counts[t] || 0), 0);
          const totalCount = presentTypes.reduce((acc, t) => acc + (counts[t] || 0), 0);
          sumLeadCount.textContent = String(on.length);
          sumLeadTotal.textContent = ` of ${presentTypes.length} types · `;
          sumMidCount.textContent = String(onCount);
          sumTail.textContent = ` of ${totalCount} items shown`;
        };
        updateSummary();
        toolbar.append(summary);
        const actions = document.createElement("div");
        actions.className = "type-toolbar-actions";
        const mkBtn = (label, handler) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "type-toolbar-btn";
          b.textContent = label;
          b.addEventListener("click", handler);
          return b;
        };
        actions.append(
          mkBtn("Select all", () => {
            for (const t of presentTypes) selectedTypes[t] = true;
            buildTypeFilter();
            render();
          }),
          mkBtn("Clear", () => {
            for (const t of presentTypes) selectedTypes[t] = false;
            buildTypeFilter();
            render();
          }),
          mkBtn("Reset", () => {
            for (const t of presentTypes) selectedTypes[t] = DEFAULTS_ON.has(t);
            buildTypeFilter();
            render();
          }),
        );
        toolbar.append(actions);
        typeFilterEl.append(toolbar);

        // Single chip row — 4 buckets max, no group headings needed.
        const chips = document.createElement("div");
        chips.className = "type-group-chips";
        for (const t of presentTypes) {
          const chip = document.createElement("button");
          chip.type = "button";
          chip.className = "type-chip" + (selectedTypes[t] ? " on" : "");
          chip.dataset.type = t;
          chip.append(document.createTextNode(COARSE_TYPES[t].label));
          const c = document.createElement("span");
          c.className = "count";
          c.textContent = counts[t];
          chip.append(c);
          chip.addEventListener("click", () => {
            selectedTypes[t] = !selectedTypes[t];
            chip.classList.toggle("on", selectedTypes[t]);
            updateSummary();
            render();
          });
          chips.append(chip);
        }
        typeFilterEl.append(chips);
      }

      async function fetchFigures() {
        // /figures shares the deferred cold-start warm-up with /query: it
        // returns 503 ("Corpus not loaded") until the background wiring task
        // finishes loading the model and scrolling the corpus. Treat that 503
        // as "wait", not "failed" — show a warming-up notice and retry, the
        // same contract the chat and single-shot pages use for /query. Any
        // other status, or 503 past the budget, becomes a sticky error.
        const warmupDeadline = performance.now() + 120000;
        while (true) {
          let res;
          try {
            // Ask for the API's upper bound so the gallery sees the whole
            // corpus, not the default 200-row page (ADR 0022 status counts).
            res = await fetch("/figures?limit=1000");
          } catch (err) {
            fetchError = `Error: ${err.message || err}`;
            return;
          }
          if (res.ok) {
            allFigures = await res.json();
            return;
          }
          if (res.status === 503 && performance.now() < warmupDeadline) {
            statusEl.textContent =
              "Server is warming up after a cold start — the first request loads the model and index and can take a minute or two. Retrying automatically…";
            await new Promise((r) => setTimeout(r, 3000));
            continue;
          }
          const detail = res.status === 503
            ? "Corpus not loaded (server returned 503 — ingest a corpus to populate /figures)."
            : `HTTP ${res.status}`;
          fetchError = `Failed to load figures: ${detail}`;
          return;
        }
      }

      function render() {
        // Surface fetchError unconditionally — render() runs after every filter
        // change, and we don't want a successful filter call to clobber the
        // earlier "couldn't load" message.
        if (fetchError) {
          statusEl.textContent = fetchError;
          clear(figuresEl);
          return;
        }
        const paperFilter = paperFilterEl.value;
        const captionFilter = captionFilterEl.value.trim().toLowerCase();
        const filtered = allFigures.filter((f) => {
          if (paperFilter && f.paper_id !== paperFilter) return false;
          if (!selectedTypes[itemType(f)]) return false;
          if (captionFilter && !(f.caption || "").toLowerCase().includes(captionFilter))
            return false;
          return true;
        });
        if (allFigures.length === 0) {
          statusEl.textContent = "No figure- or table-kind chunks in the corpus.";
        } else {
          statusEl.textContent = `${filtered.length} / ${allFigures.length} shown`;
        }
        clear(figuresEl);
        for (const f of filtered) figuresEl.append(renderFigureCard(f));
      }

      function renderFigureCard(f) {
        const li = document.createElement("li");
        li.className = "figure-card";

        const thumbWrap = document.createElement("a");
        thumbWrap.className = "thumb-wrap";
        thumbWrap.href = f.page_image_url;
        thumbWrap.target = "_blank";
        thumbWrap.rel = "noopener";

        const img = document.createElement("img");
        img.src = f.page_image_url;
        img.alt = `${f.paper_id} p${f.page_number}`;
        img.loading = "lazy";
        thumbWrap.append(img);

        // Bbox is in PDF points (PyMuPDF, top-left origin); the rendered PNG
        // is at 150 DPI (src/ingestion/visual.py:_DEFAULT_DPI). Both axes
        // scale by DPI/72, so converting points → image fractions is just
        // dividing by the page size in points (= natural pixel size × 72/DPI).
        if (Array.isArray(f.bbox) && f.bbox.length === 4) {
          img.addEventListener(
            "load",
            () => {
              const naturalW = img.naturalWidth;
              const naturalH = img.naturalHeight;
              if (!naturalW || !naturalH) return;
              const DPI = 150;
              const pageWPts = (naturalW * 72) / DPI;
              const pageHPts = (naturalH * 72) / DPI;
              const [x0, y0, x1, y1] = f.bbox;
              const bboxDiv = document.createElement("div");
              bboxDiv.className = "bbox";
              bboxDiv.style.left = `${(x0 / pageWPts) * 100}%`;
              bboxDiv.style.top = `${(y0 / pageHPts) * 100}%`;
              bboxDiv.style.width = `${((x1 - x0) / pageWPts) * 100}%`;
              bboxDiv.style.height = `${((y1 - y0) / pageHPts) * 100}%`;
              thumbWrap.append(bboxDiv);
            },
            { once: true }
          );
        }

        const body = document.createElement("div");
        body.className = "body";

        const meta = document.createElement("div");
        meta.className = "meta";
        const titleText = paperTitles[f.paper_id]
          ? paperTitles[f.paper_id]
          : f.paper_id;
        meta.textContent = `${titleText} · p${f.page_number}`;
        if (f.has_vlm_caption) {
          const tag = document.createElement("span");
          tag.className = "vlm-tag";
          tag.textContent = "VLM";
          meta.append(tag);
        }
        // Show the inferred type so the user can see *why* a card is
        // surfacing — `bar_chart(0.99)` or `logo(1.00)` etc.
        const t = itemType(f);
        if (t) {
          const tt = document.createElement("span");
          tt.className = "vlm-tag";
          tt.style.background = "var(--canvas)";
          tt.style.color = "var(--muted)";
          const conf = f.docling_label_confidence;
          tt.textContent = conf != null && f.docling_label
            ? `${t} ${conf.toFixed(2)}`
            : t;
          meta.append(tt);
        }
        body.append(meta);

        const caption = document.createElement("div");
        caption.className = "caption";
        // Caption-less items (logos, icons, uncaptioned figures) carry a
        // `[paper::pN::figN]` placeholder as their text. Show a muted label
        // instead of leaking the internal chunk id; the type chip in `meta`
        // already says what the item is (e.g. `logo 1.00`). Pattern mirrors
        // _PLACEHOLDER_CAPTION_RE in src/api/routes/figures.py.
        const rawCaption = (f.caption || "").trim();
        const isPlaceholder = /^\[.+::p\d+::(?:fig|tab)\d+\]$/.test(rawCaption);
        if (rawCaption && !isPlaceholder) {
          caption.textContent = rawCaption;
          caption.title = rawCaption; // full text on hover — the card clamps to 4 lines
        } else {
          caption.textContent = "No caption";
          caption.classList.add("is-empty");
        }
        body.append(caption);

        li.append(thumbWrap);
        li.append(body);
        return li;
      }

      function clear(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }
    </script>
  </body>
</html>
