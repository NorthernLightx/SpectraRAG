<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PrismRAG — figures</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.55;
      }
      header {
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 24px 24px 8px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .title-block h1 {
        margin: 0 0 4px;
        font-size: 22px;
        font-weight: 600;
        color: var(--fg-strong);
      }
      .title-block p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .icon-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--fg);
        border-radius: 8px;
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .icon-btn:hover { background: var(--canvas); border-color: var(--accent); color: var(--accent); }
      [data-theme="dark"] .icon-sun { display: none; }
      [data-theme="light"] .icon-moon { display: none; }

      .nav {
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 4px 24px 16px;
        display: flex;
        gap: 4px;
        font-size: 13px;
      }

      .controls {
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 16px 24px;
        display: flex;
        gap: 12px;
        align-items: end;
      }
      select, input {
        width: auto;
        min-width: 200px;
      }

      main {
        max-width: 880px;
        width: 100%;
        margin: 0 auto;
        padding: 0 24px 32px;
      }
      .status {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 12px;
      }
      .figures-grid {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }
      .figure-card {
        background: var(--canvas-elevated);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: border-color 0.15s ease, transform 0.06s ease;
      }
      .figure-card:hover { border-color: var(--accent); }
      .figure-card .thumb-wrap {
        position: relative;
        background: var(--canvas);
        border-bottom: 1px solid var(--border-subtle);
        aspect-ratio: 8.5 / 11;
        overflow: hidden;
        display: block;
      }
      .figure-card img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .figure-card .bbox {
        position: absolute;
        border: 2px solid var(--accent);
        background: var(--accent-tint);
        pointer-events: none;
      }
      .figure-card .body {
        padding: 10px 12px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .figure-card .meta {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .figure-card .caption {
        font-size: 13px;
        color: var(--fg);
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .vlm-tag {
        display: inline-block;
        background: var(--accent-tint);
        color: var(--accent);
        font-size: 10px;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 4px;
        margin-left: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .type-filter-wrap { flex: 1; min-width: 320px; }
      .type-filter {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--canvas-elevated);
        max-height: 88px;
        overflow-y: auto;
      }
      .type-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 9px;
        border-radius: 999px;
        font-size: 12px;
        background: var(--canvas);
        color: var(--muted);
        border: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
      }
      .type-chip.on {
        background: var(--accent-tint);
        color: var(--accent);
        border-color: var(--accent);
      }
      .type-chip .count {
        opacity: 0.7;
        font-variant-numeric: tabular-nums;
        font-size: 11px;
      }
      .type-chip.toggle-all { font-weight: 600; }
    </style>
  </head>
  <body>
    <header>
      <div class="title-block">
        <h1>PrismRAG</h1>
        <p>
          Browse every figure and table across the demo corpus, with
          bbox-highlighted thumbnails and Docling-classifier labels.
          Filter by element type, paper, or caption text.
        </p>
      </div>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13Zm8-5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 16 8ZM3 8a.75.75 0 0 1-.75.75H.75a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 3 8Zm10.657-5.657a.75.75 0 0 1 0 1.06l-1.06 1.061a.75.75 0 1 1-1.061-1.06l1.06-1.061a.75.75 0 0 1 1.061 0Zm-9.193 9.193a.75.75 0 0 1 0 1.061l-1.06 1.06a.75.75 0 1 1-1.061-1.06l1.06-1.06a.75.75 0 0 1 1.061 0Zm9.193 2.121a.75.75 0 0 1-1.06 0l-1.061-1.06a.75.75 0 1 1 1.06-1.061l1.061 1.06a.75.75 0 0 1 0 1.061ZM4.464 4.464a.75.75 0 0 1-1.06 0l-1.061-1.06a.75.75 0 1 1 1.06-1.061l1.061 1.06a.75.75 0 0 1 0 1.061Z"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Zm1.616 1.945a7 7 0 0 1-7.678 7.678 5.499 5.499 0 1 0 7.678-7.678Z"/>
        </svg>
      </button>
    </header>

    <nav class="nav">
      <a href="/">Single-shot</a>
      <a href="/chat.html">Chat</a>
      <a href="/papers.html">Papers</a>
      <a href="/figures.html" class="active">Figures</a>
    </nav>

    <div class="controls">
      <div>
        <label for="paperFilter">Paper</label>
        <select id="paperFilter">
          <option value="">All papers</option>
        </select>
      </div>
      <div>
        <label for="captionFilter">Caption contains</label>
        <input id="captionFilter" type="search" placeholder="e.g. accuracy, scaling" />
      </div>
      <div class="type-filter-wrap">
        <label>Element types
          <span class="info-icon" title="ADR 0022 — picks from Docling's DocumentFigureClassifier-v2.5 labels (logo, bar_chart, flow_chart, photograph, ...) plus extracted tables. Multi-select; click 'All' to flip everything on/off.">i</span>
        </label>
        <div class="type-filter" id="typeFilter"></div>
      </div>
    </div>

    <main>
      <div class="status" id="status">Loading…</div>
      <ul class="figures-grid" id="figures"></ul>
    </main>

    <script src="/app.js"></script>
    <script>
      const statusEl = document.getElementById("status");
      const figuresEl = document.getElementById("figures");
      const paperFilterEl = document.getElementById("paperFilter");
      const captionFilterEl = document.getElementById("captionFilter");
      const typeFilterEl = document.getElementById("typeFilter");

      let allFigures = [];
      let paperTitles = {}; // paper_id → title (when available)
      let fetchError = null; // sticky message when /figures couldn't load
      // type-key → bool; populated after fetch, persisted in URL hash.
      let selectedTypes = {};

      // Decorative buckets the user usually doesn't want on first load.
      // Tables and every actual figure sub-class come pre-checked.
      const TYPES_OFF_BY_DEFAULT = new Set([
        "logo",
        "icon",
        "signature",
        "stamp",
        "bar_code",
        "qr_code",
        "page_thumbnail",
        "calendar",
        "crossword_puzzle",
        "decoration",
        "unlabeled",
      ]);

      Promise.all([
        fetch("/papers")
          .then((r) => (r.ok ? r.json() : []))
          .catch(() => []),
        fetchFigures(),
      ]).then(([papers]) => {
        for (const p of papers || []) {
          paperTitles[p.paper_id] = p.title || null;
          const opt = document.createElement("option");
          opt.value = p.paper_id;
          opt.textContent = p.title ? `${p.title} (${p.paper_id})` : p.paper_id;
          paperFilterEl.append(opt);
        }
        buildTypeFilter();
        render();
      });

      paperFilterEl.addEventListener("change", render);
      captionFilterEl.addEventListener("input", render);

      // Each item's "type" is the most specific Docling label we have:
      // its `docling_label` when the classifier ran, else falls back to
      // role-as-type for legacy chunks. `kind=table` always renders as
      // `table` (independent of role).
      function itemType(f) {
        if (f.kind === "table") return "table";
        if (f.docling_label) return f.docling_label;
        return f.role || "unlabeled";
      }

      function buildTypeFilter() {
        // Count items per type so the chip carries useful weight.
        const counts = {};
        for (const f of allFigures) {
          const t = itemType(f);
          counts[t] = (counts[t] || 0) + 1;
        }
        const types = Object.keys(counts).sort();
        // Seed `selectedTypes`: types not in the off-by-default set start checked.
        for (const t of types) {
          if (!(t in selectedTypes)) selectedTypes[t] = !TYPES_OFF_BY_DEFAULT.has(t);
        }
        clear(typeFilterEl);
        // Toggle-all chip first.
        const all = document.createElement("span");
        all.className = "type-chip toggle-all";
        all.textContent = "All / none";
        all.addEventListener("click", () => {
          const anyOff = types.some((t) => !selectedTypes[t]);
          for (const t of types) selectedTypes[t] = anyOff; // turn all on if any was off; else turn all off
          buildTypeFilter();
          render();
        });
        typeFilterEl.append(all);
        for (const t of types) {
          const chip = document.createElement("span");
          chip.className = "type-chip" + (selectedTypes[t] ? " on" : "");
          chip.dataset.type = t;
          chip.append(document.createTextNode(t + " "));
          const c = document.createElement("span");
          c.className = "count";
          c.textContent = counts[t];
          chip.append(c);
          chip.addEventListener("click", () => {
            selectedTypes[t] = !selectedTypes[t];
            chip.classList.toggle("on", selectedTypes[t]);
            render();
          });
          typeFilterEl.append(chip);
        }
      }

      async function fetchFigures() {
        try {
          // Ask for the API's upper bound so the gallery sees the whole
          // corpus, not the default 200-row page (ADR 0022 status counts).
          const res = await fetch("/figures?limit=1000");
          if (!res.ok) {
            const detail = res.status === 503
              ? "Corpus not loaded (server returned 503 — ingest a corpus to populate /figures)."
              : `HTTP ${res.status}`;
            fetchError = `Failed to load figures: ${detail}`;
            return;
          }
          allFigures = await res.json();
        } catch (err) {
          fetchError = `Error: ${err.message || err}`;
        }
      }

      function render() {
        // Surface fetchError unconditionally — render() runs after every filter
        // change, and we don't want a successful filter call to clobber the
        // earlier "couldn't load" message.
        if (fetchError) {
          statusEl.textContent = fetchError;
          clear(figuresEl);
          return;
        }
        const paperFilter = paperFilterEl.value;
        const captionFilter = captionFilterEl.value.trim().toLowerCase();
        const filtered = allFigures.filter((f) => {
          if (paperFilter && f.paper_id !== paperFilter) return false;
          if (!selectedTypes[itemType(f)]) return false;
          if (captionFilter && !(f.caption || "").toLowerCase().includes(captionFilter))
            return false;
          return true;
        });
        if (allFigures.length === 0) {
          statusEl.textContent = "No figure- or table-kind chunks in the corpus.";
        } else {
          statusEl.textContent = `${filtered.length} / ${allFigures.length} shown`;
        }
        clear(figuresEl);
        for (const f of filtered) figuresEl.append(renderFigureCard(f));
      }

      function renderFigureCard(f) {
        const li = document.createElement("li");
        li.className = "figure-card";

        const thumbWrap = document.createElement("a");
        thumbWrap.className = "thumb-wrap";
        thumbWrap.href = f.page_image_url;
        thumbWrap.target = "_blank";
        thumbWrap.rel = "noopener";

        const img = document.createElement("img");
        img.src = f.page_image_url;
        img.alt = `${f.paper_id} p${f.page_number}`;
        img.loading = "lazy";
        thumbWrap.append(img);

        // Bbox is in PDF points (PyMuPDF, top-left origin); the rendered PNG
        // is at 150 DPI (src/ingestion/visual.py:_DEFAULT_DPI). Both axes
        // scale by DPI/72, so converting points → image fractions is just
        // dividing by the page size in points (= natural pixel size × 72/DPI).
        if (Array.isArray(f.bbox) && f.bbox.length === 4) {
          img.addEventListener(
            "load",
            () => {
              const naturalW = img.naturalWidth;
              const naturalH = img.naturalHeight;
              if (!naturalW || !naturalH) return;
              const DPI = 150;
              const pageWPts = (naturalW * 72) / DPI;
              const pageHPts = (naturalH * 72) / DPI;
              const [x0, y0, x1, y1] = f.bbox;
              const bboxDiv = document.createElement("div");
              bboxDiv.className = "bbox";
              bboxDiv.style.left = `${(x0 / pageWPts) * 100}%`;
              bboxDiv.style.top = `${(y0 / pageHPts) * 100}%`;
              bboxDiv.style.width = `${((x1 - x0) / pageWPts) * 100}%`;
              bboxDiv.style.height = `${((y1 - y0) / pageHPts) * 100}%`;
              thumbWrap.append(bboxDiv);
            },
            { once: true }
          );
        }

        const body = document.createElement("div");
        body.className = "body";

        const meta = document.createElement("div");
        meta.className = "meta";
        const titleText = paperTitles[f.paper_id]
          ? paperTitles[f.paper_id]
          : f.paper_id;
        meta.textContent = `${titleText} · p${f.page_number}`;
        if (f.has_vlm_caption) {
          const tag = document.createElement("span");
          tag.className = "vlm-tag";
          tag.textContent = "VLM";
          meta.append(tag);
        }
        // Show the inferred type so the user can see *why* a card is
        // surfacing — `bar_chart(0.99)` or `logo(1.00)` etc.
        const t = itemType(f);
        if (t) {
          const tt = document.createElement("span");
          tt.className = "vlm-tag";
          tt.style.background = "var(--canvas)";
          tt.style.color = "var(--muted)";
          const conf = f.docling_label_confidence;
          tt.textContent = conf != null && f.docling_label
            ? `${t} ${conf.toFixed(2)}`
            : t;
          meta.append(tt);
        }
        body.append(meta);

        const caption = document.createElement("div");
        caption.className = "caption";
        caption.textContent = f.caption || `[${f.chunk_id}]`;
        body.append(caption);

        li.append(thumbWrap);
        li.append(body);
        return li;
      }

      function clear(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }
    </script>
  </body>
</html>
