<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PrismRAG — papers</title>
    <style>
      :root,
      [data-theme="dark"] {
        --bg: #0d1117;
        --canvas: #161b22;
        --canvas-elevated: #1f242c;
        --fg: #e6edf3;
        --fg-strong: #ffffff;
        --muted: #8b949e;
        --border: #30363d;
        --border-subtle: #21262d;
        --accent: #58a6ff;
        --accent-strong: #1f6feb;
        --accent-tint: rgba(88, 166, 255, 0.15);
      }
      [data-theme="light"] {
        --bg: #ffffff;
        --canvas: #f6f8fa;
        --canvas-elevated: #ffffff;
        --fg: #1f2328;
        --fg-strong: #0d1117;
        --muted: #59636e;
        --border: #d1d9e0;
        --border-subtle: #e4e7eb;
        --accent: #0969da;
        --accent-strong: #0550ae;
        --accent-tint: rgba(9, 105, 218, 0.1);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background 0.18s ease, color 0.18s ease;
      }

      header {
        max-width: 1100px;
        width: 100%;
        margin: 0 auto;
        padding: 22px 24px 8px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }
      .title-block { flex: 1; min-width: 0; }
      h1 {
        font-size: 22px;
        margin: 0 0 4px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--fg-strong);
      }
      header p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .icon-btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        width: 36px;
        height: 36px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--fg);
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .icon-btn:hover { background: var(--canvas); border-color: var(--accent); }
      .icon-btn svg { width: 16px; height: 16px; }
      [data-theme="light"] .icon-btn .icon-moon,
      [data-theme="dark"] .icon-btn .icon-sun { display: none; }

      .nav {
        max-width: 1100px;
        width: 100%;
        margin: 0 auto;
        padding: 4px 24px 16px;
        display: flex;
        gap: 4px;
        font-size: 13px;
      }
      .nav a {
        padding: 4px 10px;
        border-radius: 999px;
        color: var(--muted);
        text-decoration: none;
        transition: background 0.15s ease, color 0.15s ease;
      }
      .nav a:hover { background: var(--canvas); color: var(--fg); }
      .nav a.active {
        background: var(--accent-tint);
        color: var(--accent);
        font-weight: 600;
      }

      main {
        max-width: 1100px;
        width: 100%;
        margin: 0 auto;
        padding: 0 24px 40px;
      }
      .status {
        color: var(--muted);
        font-size: 13px;
        padding: 12px 0;
      }

      .papers-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 16px;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .paper-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        background: var(--canvas);
        display: flex;
        flex-direction: column;
        gap: 4px;
        transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
      }
      .paper-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
      }
      .paper-card img {
        width: 100%;
        aspect-ratio: 0.77;
        object-fit: cover;
        object-position: top;
        border-radius: 4px;
        border: 1px solid var(--border-subtle);
        background: var(--bg);
        margin-bottom: 6px;
      }
      .paper-card .paper-id {
        color: var(--fg);
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, monospace;
        font-size: 11px;
        word-break: break-all;
        line-height: 1.3;
      }
      .paper-card .paper-meta {
        color: var(--muted);
        font-size: 11px;
      }
      .paper-card .paper-links {
        display: flex;
        gap: 10px;
        font-size: 12px;
        margin-top: 4px;
      }
      .paper-card a {
        color: var(--accent);
        text-decoration: none;
      }
      .paper-card a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <header>
      <div class="title-block">
        <h1>Papers in this demo</h1>
        <p>
          The corpus indexed for this multi-modal RAG demo. Click a card to
          preview the first page, or follow the arXiv / PDF links to read
          the original source.
        </p>
      </div>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8ZM8 0a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0V.75A.75.75 0 0 1 8 0Zm0 13a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 8 13Zm8-5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 16 8ZM3 8a.75.75 0 0 1-.75.75H.75a.75.75 0 0 1 0-1.5h1.5A.75.75 0 0 1 3 8Zm10.657-5.657a.75.75 0 0 1 0 1.06l-1.06 1.061a.75.75 0 1 1-1.061-1.06l1.06-1.061a.75.75 0 0 1 1.061 0Zm-9.193 9.193a.75.75 0 0 1 0 1.061l-1.06 1.06a.75.75 0 1 1-1.061-1.06l1.06-1.06a.75.75 0 0 1 1.061 0Zm9.193 2.121a.75.75 0 0 1-1.06 0l-1.061-1.06a.75.75 0 1 1 1.06-1.061l1.061 1.06a.75.75 0 0 1 0 1.061ZM4.464 4.464a.75.75 0 0 1-1.06 0l-1.061-1.06a.75.75 0 1 1 1.06-1.061l1.061 1.06a.75.75 0 0 1 0 1.061Z"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Zm1.616 1.945a7 7 0 0 1-7.678 7.678 5.499 5.499 0 1 0 7.678-7.678Z"/>
        </svg>
      </button>
    </header>

    <nav class="nav">
      <a href="/">Single-shot</a>
      <a href="/chat.html">Chat</a>
      <a href="/papers.html" class="active">Papers</a>
    </nav>

    <main>
      <div class="status" id="status">Loading…</div>
      <ul class="papers-grid" id="papers"></ul>
    </main>

    <script>
      const themeBtn = document.getElementById("themeToggle");
      const statusEl = document.getElementById("status");
      const papersEl = document.getElementById("papers");

      const savedTheme = localStorage.getItem("rag.theme");
      const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      document.documentElement.setAttribute(
        "data-theme",
        savedTheme || (prefersLight ? "light" : "dark")
      );
      themeBtn.addEventListener("click", () => {
        const next =
          document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("rag.theme", next);
      });

      async function loadPapers() {
        try {
          const res = await fetch("/papers");
          if (!res.ok) {
            statusEl.textContent = `Failed to load papers: HTTP ${res.status}`;
            return;
          }
          const papers = await res.json();
          if (!Array.isArray(papers) || papers.length === 0) {
            statusEl.textContent = "No papers in the corpus.";
            return;
          }
          statusEl.textContent = `${papers.length} papers`;
          for (const p of papers) papersEl.append(renderPaperCard(p));
        } catch (err) {
          statusEl.textContent = `Error: ${err.message || err}`;
        }
      }

      function renderPaperCard(p) {
        const li = document.createElement("li");
        li.className = "paper-card";
        const thumb = document.createElement("img");
        thumb.src = `/pages/${p.paper_id}/${p.paper_id}_p1.png`;
        thumb.alt = `First page of ${p.paper_id}`;
        thumb.loading = "lazy";
        li.append(thumb);
        const idEl = document.createElement("div");
        idEl.className = "paper-id";
        idEl.textContent = p.paper_id;
        li.append(idEl);
        const metaEl = document.createElement("div");
        metaEl.className = "paper-meta";
        metaEl.textContent = `${p.page_count} pages`;
        li.append(metaEl);
        if (p.arxiv_url) {
          const links = document.createElement("div");
          links.className = "paper-links";
          const abs = document.createElement("a");
          abs.href = p.arxiv_url;
          abs.target = "_blank";
          abs.rel = "noopener";
          abs.textContent = "arXiv";
          const pdf = document.createElement("a");
          pdf.href = p.pdf_url;
          pdf.target = "_blank";
          pdf.rel = "noopener";
          pdf.textContent = "PDF";
          links.append(abs, pdf);
          li.append(links);
        }
        return li;
      }

      loadPapers();
    </script>
  </body>
</html>
