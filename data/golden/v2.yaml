name: phase1-text-baseline
version: v2
# 23 queries spanning 5 ArXiv papers. Inherits all 15 v1.1 queries on
# 2604.22753v1 (scaling-law fitting); adds 2 queries each (1 factual + 1 OOC)
# on 4 newly-fetched papers spanning PDEs/PINN, agent simulation, RL alignment,
# and game theory. Chunk IDs verified against `scripts/dump_chunks.py` output.
queries:
  # === v1.1 queries (paper: 2604.22753v1, scaling-law fitting) ===
  - query_id: q1_inter_basin
    text: "What is the inter-basin gain criterion?"
    paper_id: "2604.22753v1"
    category: factual
    relevant_chunk_ids: ["2604.22753v1::p5::c24"]
    expected_facts: ["The inter-basin gain measures expected variance reduction across basins."]
    note: "Single-hop, definitional."

  - query_id: q2_bic_ranking
    text: "How does the paper rank basins?"
    paper_id: "2604.22753v1"
    category: factual
    relevant_chunk_ids: ["2604.22753v1::p19::c76"]
    expected_facts: ["Basins are ranked by an information criterion derived from empirical fit."]
    note: "Single-hop, mechanism."

  - query_id: q3_approximation_options
    text: "What approximations are used to score basins?"
    paper_id: "2604.22753v1"
    category: factual
    relevant_chunk_ids: ["2604.22753v1::p19::c76", "2604.22753v1::p19::c77"]
    expected_facts:
      - "BIC-style approximation is used for robustness."
      - "Laplace form provides a local-evidence interpretation."
    note: "Multi-source: two adjacent chunks discuss the two options."

  - query_id: q4_target_region
    text: "Why is the predictive accuracy goal restricted to a target region?"
    paper_id: "2604.22753v1"
    category: multi_hop
    relevant_chunk_ids: ["2604.22753v1::p2::c11", "2604.22753v1::p3::c18"]
    expected_facts:
      - "The goal is predictive accuracy in a held-out target region in the high-cost regime."
    note: "Multi-hop, motivation + method."

  - query_id: q5_oc_weather
    text: "Will it rain on Mars tomorrow?"
    paper_id: "2604.22753v1"
    category: out_of_corpus
    relevant_chunk_ids: []
    expected_facts: []
    note: "Refusal expected. Used to verify the system does not hallucinate."

  - query_id: q6_basin_definition
    text: "What is a basin in this paper?"
    paper_id: "2604.22753v1"
    category: factual
    relevant_chunk_ids: ["2604.22753v1::p4::c19"]
    expected_facts: ["A basin is a locally optimal fit of the scaling law."]
    note: "Definitional."

  - query_id: q7_posterior_mixture
    text: "How is the posterior over scaling-law parameters approximated?"
    paper_id: "2604.22753v1"
    category: factual
    relevant_chunk_ids: ["2604.22753v1::p4::c19"]
    expected_facts: ["A weighted mixture of K local Gaussians: p(θ|Dt) ≈ Σ wk N(θk, Σk)."]
    note: "Definitional, equation."

  - query_id: q8_benchmark_size
    text: "How many tasks and scaling-law instances are in the benchmark?"
    paper_id: "2604.22753v1"
    category: factual
    relevant_chunk_ids: ["2604.22753v1::p5::c26"]
    expected_facts: ["8 tasks, 65 scaling-law instances."]
    note: "Quantitative single-fact."

  - query_id: q9_baselines
    text: "Which baselines does the paper compare against?"
    paper_id: "2604.22753v1"
    category: factual
    relevant_chunk_ids: ["2604.22753v1::p6::c29", "2604.22753v1::p6::c30"]
    expected_facts: ["Five baselines: Random, D-opt, V-opt, plus two others."]
    note: "Multi-source."

  - query_id: q10_ablation_terms
    text: "What does the ablation study remove from the acquisition function?"
    paper_id: "2604.22753v1"
    category: factual
    relevant_chunk_ids: ["2604.22753v1::p9::c44"]
    expected_facts: ["Removes ΔVinter or ΔVintra."]
    note: "Single-hop."

  - query_id: q11_budget_levels
    text: "What budget levels are used in the experiments?"
    paper_id: "2604.22753v1"
    category: factual
    relevant_chunk_ids: ["2604.22753v1::p6::c28"]
    expected_facts: ["1%/5%/10% for most tasks; 20%/35%/50% for domain and sparsity."]
    note: "Quantitative facts in one chunk."

  - query_id: q12_multibasin_vs_vopt
    text: "Why does this method maintain multiple basins rather than a single best-fit linearization?"
    paper_id: "2604.22753v1"
    category: multi_hop
    relevant_chunk_ids: ["2604.22753v1::p4::c19", "2604.22753v1::p8::c39"]
    expected_facts:
      - "V-opt uses single linearization; this method uses mixture-of-Gaussians."
    note: "Multi-hop, definition + comparison."

  - query_id: q13_figure1_lrbsz
    text: "What does Figure 1 illustrate on the lr&bsz task?"
    paper_id: "2604.22753v1"
    category: figure
    relevant_chunk_ids: ["2604.22753v1::p2::c10"]
    expected_facts: ["Predicted optimum reaches the low-loss region within 1% of the budget."]
    note: "Figure caption query."

  - query_id: q14_final_acquisition
    text: "How is the final acquisition score combined?"
    paper_id: "2604.22753v1"
    category: equation
    relevant_chunk_ids: ["2604.22753v1::p25::c89"]
    expected_facts: ["ΔMSPEtar(x) = ΔVintra(x) + ΔVinter(x)."]
    note: "Equation chunk."

  - query_id: q15_oc_gpt4
    text: "What is the loss curve of GPT-4?"
    paper_id: "2604.22753v1"
    category: out_of_corpus
    relevant_chunk_ids: []
    expected_facts: []
    note: "OOC: paper does not discuss GPT-4."

  # === v2 additions (4 papers added to the v1 corpus) ===
  # Paper: 2604.28180v1 — Adaptive Wavelet-based PINN
  - query_id: q16_aw_pinn_what
    text: "What is AW-PINN?"
    paper_id: "2604.28180v1"
    category: factual
    relevant_chunk_ids: ["2604.28180v1::p3::c10"]
    expected_facts:
      - "Adaptive wavelet-based PINN that dynamically adapts the wavelet family."
    note: "v2. Definitional."

  - query_id: q17_oc_pinn_rl
    text: "How does AW-PINN handle reinforcement learning?"
    paper_id: "2604.28180v1"
    category: out_of_corpus
    relevant_chunk_ids: []
    expected_facts: []
    note: "v2. OOC: paper is about PDE solvers, not RL."

  # Paper: 2604.28181v1 — Synthetic Computers at Scale
  - query_id: q18_synth_computer_count
    text: "How many synthetic computers were created in the preliminary experiments?"
    paper_id: "2604.28181v1"
    category: factual
    relevant_chunk_ids: ["2604.28181v1::p1::c1"]
    expected_facts: ["1,000 synthetic computers."]
    note: "v2. Quantitative single-fact."

  - query_id: q19_oc_synth_energy
    text: "What is the energy consumption of the data center used to run the simulations?"
    paper_id: "2604.28181v1"
    category: out_of_corpus
    relevant_chunk_ids: []
    expected_facts: []
    note: "v2. OOC: paper does not discuss energy or hardware footprint."

  # Paper: 2604.28182v1 — Exploration Hacking (RL alignment)
  - query_id: q20_exploration_hacking
    text: "What is exploration hacking?"
    paper_id: "2604.28182v1"
    category: factual
    relevant_chunk_ids: ["2604.28182v1::p2::c5"]
    expected_facts:
      - "An RL failure mode where the model intentionally alters its exploration to shape training."
    note: "v2. Definitional, term + definition in one chunk."

  - query_id: q21_oc_llama_finetune
    text: "What hyperparameters were used to fine-tune Llama 3?"
    paper_id: "2604.28182v1"
    category: out_of_corpus
    relevant_chunk_ids: []
    expected_facts: []
    note: "v2. OOC: paper studies exploration hacking on different model families."

  # Paper: 2604.28186v1 — Computing Equilibrium beyond Unilateral Deviation
  - query_id: q22_mase_definition
    text: "What does MASE stand for in this paper?"
    paper_id: "2604.28186v1"
    category: factual
    relevant_chunk_ids: ["2604.28186v1::p2::c4"]
    expected_facts: ["Minimum Average-Strong Equilibrium."]
    note: "v2. Definitional, acronym expansion."

  - query_id: q23_oc_eurozone
    text: "What is the current inflation rate of the eurozone?"
    paper_id: "2604.28186v1"
    category: out_of_corpus
    relevant_chunk_ids: []
    expected_facts: []
    note: "v2. OOC: completely unrelated to game theory paper."
